name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build, Sign and Publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode keystore
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore/my-release-key.jks

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          set -e
          SDK_ROOT="$ANDROID_SDK_ROOT"
          mkdir -p "$SDK_ROOT"
          cd "$SDK_ROOT"
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d cmdline-tools-temp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root="$SDK_ROOT" --licenses
          cmdline-tools/latest/bin/sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -x lint

      - name: Locate APK
        id: find_apk
        run: |
          set -e
          APK_UNSIGNED="$(find android/app/build -type f -name "*release-unsigned*.apk" | head -n1)"
          APK_SIGNED="$(find android/app/build -type f -name "*release.apk" | grep -v "-unsigned" | head -n1)"
          if [ -n "$APK_SIGNED" ]; then
            echo "apk_path=$APK_SIGNED" >> $GITHUB_OUTPUT
          elif [ -n "$APK_UNSIGNED" ]; then
            echo "apk_path=$APK_UNSIGNED" >> $GITHUB_OUTPUT
          else
            echo "No APK found"
            exit 1
          fi

      - name: Sign APK (if unsigned)
        if: steps.find_apk.outputs.apk_path != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          APK_PATH=${{ steps.find_apk.outputs.apk_path }}
          echo "Found APK: $APK_PATH"

          # If APK filename contains "unsigned" we'll sign it, otherwise assume already signed
          if [[ "$APK_PATH" == *"unsigned"* ]]; then
            echo "Signing unsigned APK..."
            APKSIGNER="$(find $ANDROID_SDK_ROOT/build-tools -type f -name apksigner | head -n1)"
            if [ -z "$APKSIGNER" ]; then
              APKSIGNER="$(find $ANDROID_HOME/build-tools -type f -name apksigner | head -n1)"
            fi
            cp "$APK_PATH" app-release-unsigned.apk
            $APKSIGNER sign --ks android/keystore/my-release-key.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --out app-release-signed.apk app-release-unsigned.apk
            $APKSIGNER verify --print-certs app-release-signed.apk
            mv app-release-signed.apk signed-app-release.apk
            echo "signed_apk=signed-app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "APK appears signed. Copying to artifact path."
            cp "$APK_PATH" signed-app-release.apk
            echo "signed_apk=signed-app-release.apk" >> $GITHUB_OUTPUT
          fi

      - name: Generate SHA256
        if: success()
        run: |
          sha256sum signed-app-release.apk > signed-app-release.apk.sha256

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: signed-app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SHA256 to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: signed-app-release.apk.sha256
          asset_name: app-release.apk.sha256
          asset_content_type: text/plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
